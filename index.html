<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サイコロアプリ</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 100px;
    }
    #result {
      font-size: 80px;
      margin: 30px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

  <h1>サイコロ</h1>
  <div id="result">🎲</div>
  <button onclick="rollDice()">振る</button>

  <script>
    function rollDice() {
      const number = Math.floor(Math.random() * 6) + 1;
      document.getElementById("result").textContent = number;
    }
  </script>

</body>
</html>
